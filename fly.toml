app = "cnphoneapi"
primary_region = "yyz"

[build]
  command = "pip install -r requirements.txt"

[http_service]
  command = "python -m uvicorn app.main:app --host 0.0.0.0 --port 8080"
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 8080
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
