app = "cnphoneapi"
primary_region = "yyz"

[build]
  command = "pip install -r requirements.txt"

[http_service]
  # 优化：合并依赖安装到启动命令，确保运行时能找到依赖
  command = "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 8080
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

# 新增：延长健康检查超时，适配启动慢的场景
[[services.tcp_checks]]
  grace_period = "30s"
  interval = "15s"
  timeout = "5s"
  restart_limit = 6